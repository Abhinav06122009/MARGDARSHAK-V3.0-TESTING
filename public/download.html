<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARGDARSHAK | DOWNLOAD CENTER</title>

    <!-- Meta -->
    <meta property="og:title" content="MARGDARSHAK | Download Suite">
    <meta property="og:description" content="Download the complete AI Educational Suite for Windows and Android.">
    <meta property="og:image" content="https://margdarshan.tech/logo.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --ai-glow: #0ea5e9;
            --primary: #10b981;
            --primary-bright: #34d399;
            --accent: #6366f1;
            --bg: #000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            overflow-x: hidden;
            background: 
                radial-gradient(circle at 5% 5%, rgba(16, 185, 129, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 95% 95%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                #000;
        }

        /* DOWNLOAD CONTAINER */
        .download-card {
            width: 100%;
            max-width: 520px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(50px) saturate(200%);
            border-radius: 40px;
            padding: 2.5rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            box-shadow: 0 50px 120px rgba(0, 0, 0, 1), inset 0 0 0 1px rgba(255,255,255,0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            width: 80px;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 20px var(--ai-glow));
        }

        .badge {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary-bright);
            padding: 0.4rem 1.2rem;
            border-radius: 99px;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 0.8rem;
            text-align: center;
            background: linear-gradient(to bottom, #fff, #999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 2.5rem;
            line-height: 1.4;
        }

        /* DOWNLOAD OPTIONS */
        .options-stack {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .download-btn {
            width: 100%;
            padding: 1.5rem;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* EXE STYLE */
        .btn-exe {
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.1), rgba(99, 102, 241, 0.1));
        }
        .btn-exe:hover {
            background: rgba(14, 165, 233, 0.2);
            border-color: var(--ai-glow);
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(14, 165, 233, 0.2);
        }

        /* APK STYLE */
        .btn-apk {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(52, 211, 153, 0.1));
        }
        .btn-apk:hover {
            background: rgba(16, 185, 129, 0.2);
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(16, 185, 129, 0.2);
        }

        .btn-content {
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }

        .icon-box {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .exe-icon { color: var(--ai-glow); }
        .apk-icon { color: var(--primary); }

        .btn-text {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .platform {
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.6;
        }

        .file-name {
            font-size: 1.1rem;
            font-weight: 900;
        }

        .arrow {
            opacity: 0.4;
            transition: transform 0.3s ease;
        }

        .download-btn:hover .arrow {
            opacity: 1;
            transform: translateX(5px);
        }

        /* FOOTER */
        .footer {
            margin-top: 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
        }

        .back-link {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 700;
            transition: color 0.3s ease;
        }

        .back-link:hover { color: #fff; }

        .credit {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-weight: 800;
        }

        /* NOISE OVERLAY */
        .noise {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            opacity: 0.04;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }
    </style>
</head>

<body>
    <div class="download-card">
        <div class="noise"></div>

        <img src="/logo.png" alt="Logo" class="logo">
        <div class="badge">OFFICIAL APPS</div>
        <h1>DOWNLOAD</h1>
        <p class="subtitle">Experience the full power of MARGDARSHAK on your preferred device.</p>

        <div class="options-stack">
            <!-- WINDOWS EXE -->
            <a href="/downloads/Margdarshak_Setup.exe" class="download-btn btn-exe">
                <div class="btn-content">
                    <div class="icon-box exe-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                            <line x1="8" y1="21" x2="16" y2="21"></line>
                            <line x1="12" y1="17" x2="12" y2="21"></line>
                        </svg>
                    </div>
                    <div class="btn-text">
                        <span class="platform">Windows Desktop</span>
                        <span class="file-name">Setup.exe</span>
                    </div>
                </div>
                <div class="arrow">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </div>
            </a>

            <!-- ANDROID APK -->
            <a href="/downloads/Margdarshak.apk" class="download-btn btn-apk">
                <div class="btn-content">
                    <div class="icon-box apk-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
                            <line x1="12" y1="18" x2="12.01" y2="18"></line>
                        </svg>
                    </div>
                    <div class="btn-text">
                        <span class="platform">Android Mobile</span>
                        <span class="file-name">Margdarshak.apk</span>
                    </div>
                </div>
                <div class="arrow">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </div>
            </a>
        </div>

        <div class="footer">
            <a href="/" class="back-link">← Back to Platform</a>
            <div class="credit">Developed by VSAV GYANTAPA</div>
        </div>
    </div>
</body>

</html>
