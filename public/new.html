<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARGDARSHAK V3.0 | LIVE</title>
    
    <!-- Meta for Social Sharing -->
    <meta property="og:title" content="MARGDARSHAK V3.0 | Beta Live">
    <meta property="og:description" content="Access the ultimate student productivity suite at margdarshan.tech">
    <meta property="og:image" content="https://margdarshan.tech/logo.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #10b981;
            --primary-bright: #34d399;
            --primary-glow: rgba(16, 185, 129, 0.7);
            --bg: #020202;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Animated Mesh Background */
        .mesh-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.15) 0%, transparent 60%),
                radial-gradient(circle at 0% 0%, rgba(14, 165, 233, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.1) 0%, transparent 40%);
            filter: blur(100px);
            animation: pulseBg 10s infinite alternate;
        }

        @keyframes pulseBg {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .noise {
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.04;
            background-image: url('/noise.svg');
            pointer-events: none;
        }

        /* COMPACT POSTER CARD (Social Optimized) */
        .poster {
            width: 90vw;
            max-width: 600px;
            aspect-ratio: 4/5;
            background: var(--card-bg);
            backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            box-shadow: 
                0 40px 100px rgba(0, 0, 0, 0.8),
                inset 0 0 20px rgba(255, 255, 255, 0.05);
            animation: entrance 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes entrance {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Center Logo Section */
        .logo-wrap {
            position: relative;
            margin-bottom: 2rem;
        }

        .logo-aura {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            background: var(--primary);
            filter: blur(70px);
            opacity: 0.5;
            border-radius: 50%;
            z-index: -1;
            animation: pulseAura 3s infinite alternate;
        }

        @keyframes pulseAura {
            0% { opacity: 0.3; transform: translate(-50%, -50%) scale(0.9); }
            100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.2); }
        }

        .logo {
            width: 140px;
            height: 140px;
            object-fit: contain;
            filter: drop-shadow(0 0 20px var(--primary-glow));
            animation: float 5s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }

        /* Headline */
        .status-badge {
            background: linear-gradient(90deg, var(--primary), #34d399);
            color: #000;
            padding: 0.4rem 1.2rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            margin-bottom: 1rem;
            text-transform: uppercase;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(2rem, 8vw, 3rem);
            font-weight: 800;
            line-height: 1;
            margin-bottom: 0.5rem;
            text-align: center;
            background: linear-gradient(to bottom, #fff, #999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .url {
            color: var(--primary-bright);
            font-family: monospace;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        /* Feature Cloud (Compact Chips) */
        .feature-cloud {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.6rem;
            margin-bottom: 2rem;
            max-width: 90%;
        }

        .chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.4rem 0.8rem;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .chip:hover {
            background: var(--primary);
            color: #000;
            transform: scale(1.1);
            border-color: var(--primary);
        }

        .chip.highlight {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Final Action */
        .btn {
            background: #fff;
            color: #000;
            padding: 1rem 2.5rem;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 800;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
        }

        .btn:hover {
            transform: translateY(-3px);
            background: var(--primary-bright);
            box-shadow: 0 15px 40px var(--primary-glow);
        }

        .footer-tag {
            position: absolute;
            bottom: 2rem;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>
    <div class="noise"></div>

    <div class="poster">
        <div class="logo-wrap">
            <div class="logo-aura"></div>
            <img src="/logo.png" alt="Logo" class="logo">
        </div>

        <div class="status-badge">BETA RELEASE LIVE</div>
        
        <h1>MARGDARSHAK V3.0</h1>
        <div class="url">margdarshan.tech</div>

        <div class="feature-cloud">
            <div class="chip highlight">AI Study Orchestrator</div>
            <div class="chip">Zero-Trust Identity</div>
            <div class="chip highlight">Elite Rhodium UI</div>
            <div class="chip">Adaptive Courses</div>
            <div class="chip">Quantum Search</div>
            <div class="chip highlight">Grade Pro</div>
            <div class="chip">Virtual Pet</div>
            <div class="chip">Pomodoro Focus</div>
            <div class="chip highlight">Interview Prep</div>
            <div class="chip">Smart Timetable</div>
            <div class="chip">Resume Builder</div>
            <div class="chip">Forensic Logs</div>
            <div class="chip highlight">Syllabus AI</div>
        </div>

        <a href="https://margdarshan.tech" class="btn">Launch Suite</a>

        <div class="footer-tag">Created by Abhinav Jha</div>
    </div>

    <script>
        // Maxxed interactivity: Mouse tracking parallax
        const poster = document.querySelector('.poster');
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 40;
            const y = (window.innerHeight / 2 - e.pageY) / 40;
            poster.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });
        document.addEventListener('mouseleave', () => {
            poster.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });
    </script>
</body>
</html>
