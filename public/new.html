<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARGDARSHAK V3.0 | BETA IS LIVE</title>
    <meta name="description" content="The next generation of academic productivity is here. MARGDARSHAK V3.0 Beta is now live.">
    
    <!-- Meta for Social Sharing -->
    <meta property="og:title" content="MARGDARSHAK V3.0 | Beta Live">
    <meta property="og:description" content="Explore the ultimate student productivity suite at margdarshan.tech">
    <meta property="og:image" content="https://margdarshan.tech/logo.png">
    <meta name="twitter:card" content="summary_large_image">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #10b981;
            --primary-bright: #34d399;
            --primary-glow: rgba(16, 185, 129, 0.6);
            --secondary: #0ea5e9;
            --bg: #030303;
            --card-bg: rgba(10, 10, 10, 0.7);
            --border-glow: rgba(255, 255, 255, 0.15);
            --rhodium: linear-gradient(135deg, #f3f4f6 0%, #9ca3af 50%, #374151 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Animated Mesh Background */
        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 0% 0%, rgba(16, 185, 129, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 0%, rgba(14, 165, 233, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 100%, rgba(16, 185, 129, 0.1) 0%, transparent 50%);
            filter: blur(100px);
            animation: meshMove 20s infinite alternate;
        }

        @keyframes meshMove {
            0% { transform: scale(1); }
            100% { transform: scale(1.2) translate(5%, 5%); }
        }

        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.03;
            background-image: url('/noise.svg');
            pointer-events: none;
        }

        /* Main Compact Container */
        .share-card {
            width: 100%;
            max-width: 650px;
            margin: 2rem;
            background: var(--card-bg);
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--border-glow);
            border-radius: 40px;
            padding: 3rem 2.5rem;
            text-align: center;
            position: relative;
            box-shadow: 
                0 0 80px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(16, 185, 129, 0.05);
            animation: cardEntrance 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .share-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 40px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255,255,255,0.3), transparent, rgba(16, 185, 129, 0.3));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Logo Area */
        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 2.5rem;
        }

        .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140px;
            height: 140px;
            background: var(--primary);
            filter: blur(60px);
            opacity: 0.4;
            border-radius: 50%;
            z-index: -1;
            animation: logoPulse 4s infinite alternate;
        }

        @keyframes logoPulse {
            0% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.2); }
        }

        .logo {
            width: 100px;
            height: 100px;
            object-fit: contain;
            filter: drop-shadow(0 0 15px var(--primary-glow));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Text Styling */
        .badge {
            display: inline-block;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: #000;
            padding: 0.4rem 1.2rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 800;
            line-height: 1;
            margin-bottom: 1rem;
            background: linear-gradient(to bottom, #fff, #999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 span {
            display: block;
            background: linear-gradient(90deg, var(--primary-bright), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            max-width: 80%;
            margin-left: auto;
            margin-right: auto;
        }

        /* Features List - Compact */
        .features-summary {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 3rem;
            text-align: left;
        }

        .f-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: rgba(255, 255, 255, 0.03);
            padding: 0.75rem 1rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .f-item svg {
            color: var(--primary);
            flex-shrink: 0;
        }

        /* Action Area */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn-primary {
            background: #fff;
            color: #000;
            padding: 1.2rem 2rem;
            border-radius: 18px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            background: var(--primary-bright);
            box-shadow: 0 15px 40px var(--primary-glow);
        }

        .url-display {
            font-family: monospace;
            color: var(--primary);
            background: rgba(16, 185, 129, 0.1);
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            font-size: 0.9rem;
            display: inline-block;
            border: 1px dashed rgba(16, 185, 129, 0.3);
        }

        /* Footer */
        .credit {
            margin-top: 3rem;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* Responsive Fixes */
        @media (max-width: 480px) {
            .share-card { padding: 2rem 1.5rem; margin: 1rem; }
            .features-summary { grid-template-columns: 1fr; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <div class="mesh-bg"></div>
    <div class="noise"></div>

    <div class="share-card">
        <div class="logo-container">
            <div class="logo-glow"></div>
            <img src="/logo.png" alt="MARGDARSHAK Logo" class="logo">
        </div>

        <div class="badge">V3.0 DEPLOYED</div>
        
        <h1>MARGDARSHAK <span>BETA IS LIVE</span></h1>
        
        <p class="tagline">The ultimate student productivity suite has evolved. Experience the next generation of academic excellence.</p>

        <div class="features-summary">
            <div class="f-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                AI Study Orchestrator
            </div>
            <div class="f-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                Zero-Trust Security
            </div>
            <div class="f-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                Elite Rhodium Themes
            </div>
            <div class="f-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                Quantum Search Hub
            </div>
        </div>

        <div class="actions">
            <a href="https://margdarshan.tech" class="btn-primary">
                Launch Platform
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </a>
            <div>
                <span class="url-display">margdarshan.tech</span>
            </div>
        </div>

        <p class="credit">Developed by Abhinav Jha</p>
    </div>

    <script>
        // Subtle tilt effect on mouse move for that "maxxed" feel
        const card = document.querySelector('.share-card');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 40;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 40;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Reset tilt on mouse leave
        document.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });
    </script>
</body>
</html>
