[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_KEYS = "ID_SALT,SUPABASE_SERVICE_ROLE_KEY,FUNCTION_SUPABASE_SERVICE_ROLE_KEY,SAMBANOVA_API_KEY,SERPER_API_KEY,OPENROUTER_API_KEY,VITE_GITHUB_AI_TOKEN,VITE_SUPABASE_URL,VITE_SUPABASE_PUBLISHABLE_KEY,SUPABASE_URL,OPENAI_API_KEY"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# ZENITH FIX: Ensure missing assets return 404 instead of index.html
[[redirects]]
  from = "/assets/*.js"
  to = "/404-js"
  status = 404
  force = true

[[redirects]]
  from = "/assets/*.css"
  to = "/404-css"
  status = 404
  force = true

[[redirects]]
  from = "/assets/*"
  to = "/index.html"
  status = 404

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # Allow WebAuthn (passkeys) and explicitly disable other powerful features.
    Permissions-Policy = "publickey-credentials-create=(self), publickey-credentials-get=(self), accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    # CSP allowing Supabase, OpenRouter, Google Ads, Fontshare, Puter, Clerk, Sentry, Cloudflare, Pixabay, and self-hosted assets.
    Content-Security-Policy = "default-src 'self'; upgrade-insecure-requests; base-uri 'self'; form-action 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.google.com https://*.gstatic.com https://*.googlesyndication.com https://ep2.adtrafficquality.google https://api.puter.com https://*.clerk.margdarshan.tech https://clerk.margdarshan.tech https://challenges.cloudflare.com https://*.sentry.io https://sentry.io https://cdn.uropay.me; style-src 'self' 'unsafe-inline' https://cdn.fontshare.com https://*.googleapis.com https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://cdn.fontshare.com https://*.gstatic.com https://*.googleapis.com https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://openrouter.ai https://api.puter.com https://*.googlesyndication.com https://*.sentry.io https://sentry.io https://*.clerk.margdarshan.tech https://clerk.margdarshan.tech https://api.ipify.org https://*.googleapis.com https://*.gstatic.com https://*.pixabay.com https://cdn.pixabay.com https://raw.githubusercontent.com https://fonts.googleapis.com https://fonts.gstatic.com https://gen.pollinations.ai https://api.resend.com; frame-src 'self' https://*.doubleclick.net https://*.googlesyndication.com https://*.clerk.margdarshan.tech https://clerk.margdarshan.tech https://challenges.cloudflare.com; worker-src 'self' blob:; media-src 'self' blob: https: https://*.pixabay.com https://cdn.pixabay.com;"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
